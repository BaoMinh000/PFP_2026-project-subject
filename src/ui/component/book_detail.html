<div style="font-family: 'Segoe UI', sans-serif; line-height: 1.6; height: 100%; width: 100%; border: none;">
    <h2 style="color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 5px;">
        📘 Chi tiết sách
    </h2>
    
    <p style="margin: 10px 0;">
        <b style="color: #34495e;">Tiêu đề:</b><br>
        <span style="font-size: 16px; color: #2980b9;">{title}</span>
    </p>

    <p><b>✍️ Tác giả:</b> {author}</p>
    <p><b>🏷️ Thể loại:</b> {category}</p>
    <p><b>📅 Năm xuất bản:</b> {year}</p>
    
    <div style="margin-top: 15px; padding: 10px; background-color: {status_color}; color: white; border-radius: 5px; text-align: center; font-weight: bold;">
        Trạng thái: {status_text}
    </div>

    <p style="margin-top: 15px; border-top: 1px solid #ddd; padding-top: 10px;">
        📊 <b>Số lần mượn:</b> {borrow_count}
    </p>
</div>
